      function useBackgroundScrollSystem() {
        useEffect(() => {
          let ticking = false;

          const updateBackground = () => {
            const doc = document.documentElement;
            const body = document.body;
            const scrollTop = window.scrollY || doc.scrollTop || 0;
            const maxScroll = Math.max(1, body.scrollHeight - window.innerHeight);
            const pageProgress = clamp01(scrollTop / maxScroll);

            const aboutSection = document.getElementById("about");
            const projectsSection = document.getElementById("projects");
            const contactSection = document.getElementById("contact");

            const viewport = Math.max(window.innerHeight, 1);
            const aboutStart = aboutSection ? Math.max(0, aboutSection.offsetTop - viewport * 0.8) : viewport * 0.45;
            const aboutMid = aboutSection ? aboutSection.offsetTop + viewport * 0.1 : viewport * 0.95;
            const projectsStart = projectsSection ? projectsSection.offsetTop - viewport * 0.45 : viewport * 2.2;
            const contactStart = contactSection ? contactSection.offsetTop - viewport * 0.8 : viewport * 3.3;

            const warmIntro = smoothStep(aboutStart, aboutMid, scrollTop);
            const coldFade = smoothStep(aboutStart, projectsStart, scrollTop);
            const deeperFade = smoothStep(projectsStart, contactStart, scrollTop);

            const coldOpacity = clamp01(1 - coldFade * 0.95);
            const warmBase = 0.34 + deeperFade * 0.18;
            const warmOpacity = clamp01(warmIntro * 0.62 + (warmIntro > 0 ? warmBase : 0));
            const warmGlowOpacity = clamp01(smoothStep(aboutStart + viewport * 0.15, contactStart, scrollTop) * 0.9);
            const deepShadowOpacity = Math.min(0.68, 0.18 + deeperFade * 0.4 + pageProgress * 0.12);

            doc.style.setProperty("--scroll-progress", pageProgress.toFixed(4));
            doc.style.setProperty("--warm-opacity", warmOpacity.toFixed(4));
            doc.style.setProperty("--cold-opacity", coldOpacity.toFixed(4));
            doc.style.setProperty("--warm-glow-opacity", warmGlowOpacity.toFixed(4));
            doc.style.setProperty("--deep-shadow-opacity", deepShadowOpacity.toFixed(4));
            doc.style.setProperty("--bg-cold-shift", `${(-Math.min(scrollTop * 0.018, 24)).toFixed(2)}px`);
            doc.style.setProperty("--bg-warm-shift", `${(-Math.min(scrollTop * 0.01, 14)).toFixed(2)}px`);

            ticking = false;
          };

          const onScroll = () => {
            if (ticking) return;
            ticking = true;
            window.requestAnimationFrame(updateBackground);
          };

          updateBackground();
          window.addEventListener("scroll", onScroll, { passive: true });
          window.addEventListener("resize", onScroll);

          return () => {
            window.removeEventListener("scroll", onScroll);
            window.removeEventListener("resize", onScroll);
          };
        }, []);
      }

      function BlurText({ text, className = "" }) {
        const [visible, setVisible] = useState(false);
        const ref = useRef(null);

        useEffect(() => {
          const node = ref.current;
          if (!node) return;
          const observer = new IntersectionObserver(
            ([entry]) => {
              if (entry.isIntersecting) {
                setVisible(true);
                observer.disconnect();
              }
            },
            { threshold: 0.1 }
          );
          observer.observe(node);
          return () => observer.disconnect();
        }, []);

        return (
          <p ref={ref} className={`${className} hero-title flex flex-wrap justify-start`} style={{ columnGap: "0.28em", rowGap: "0.08em" }}>
            {text.split(" ").map((word, index) => (
              <motion.span
                key={`${word}-${index}`}
                initial={{ filter: "blur(10px)", opacity: 0, y: 50 }}
                animate={
                  visible
                    ? {
                        filter: ["blur(10px)", "blur(5px)", "blur(0px)"],
                        opacity: [0, 0.5, 1],
                        y: [50, -5, 0],
                      }
                    : undefined
                }
                transition={{ duration: 0.7, times: [0, 0.5, 1], ease: "easeOut", delay: index * 0.09 }}
                style={{ display: "inline-block" }}
              >
                {word}
              </motion.span>
            ))}
          </p>
        );
      }
